name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git zip unzip openjdk-17-jdk \
            autoconf libtool libltdl-dev pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
 
      - name: 安装 Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: 打包 APK
        run: |
          yes | buildozer android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: pixel-survival-apk
          path: bin/*.apk
